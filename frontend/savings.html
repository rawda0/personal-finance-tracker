<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings - Personal Finance Tracker</title>
    <link rel="stylesheet" href="styles/savings.css">
</head>

<body class="savings-page">
    <header class="navbar">
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="transactions.html" class="nav-link">Transactions</a>
            <a href="savings.html" class="nav-link active">Savings</a>
        </nav>
        <div class="user-section">
            <span class="user-name" id="userName">Loading...</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="savings-content">
        <div class="goal-form-card">
            <h2>Set Savings Goal</h2>
            <form id="savingsGoalForm">
                <div class="form-group">
                    <label for="goalName">Goal Name</label>
                    <input type="text" id="goalName" placeholder="e.g., Vacation, Emergency Fund" required>
                </div>
                <div class="form-group">
                    <label for="targetAmount">Target Amount</label>
                    <input type="number" id="targetAmount" placeholder="0.00" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="currentSavings">Current Savings</label>
                    <input type="number" id="currentSavings" placeholder="0.00" step="0.01" required>
                </div>
                <button type="submit" class="submit-btn goal-btn">Create Goal</button>
            </form>
        </div>

        <div class="savings-goals">
            <h2>Savings Progress</h2>
            <div class="goals-list" id="goalsList">
                <!-- Savings goals will be populated here -->
            </div>
        </div>
    </main>

    <script type="module" src="scripts/savings.js"></script>
</body>

</html>
