<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Personal Finance Tracker</title>
    <link rel="stylesheet" href="styles/transactions.css">
</head>

<body class="transactions-page">
    <header class="navbar">
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="transactions.html" class="nav-link active">Transactions</a>
            <a href="savings.html" class="nav-link">Savings</a>
        </nav>
        <div class="user-section">
            <span class="user-name" id="userName">Loading...</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="transactions-content">
        <div class="transaction-forms">
            <div class="form-card">
                <h2>Add Income</h2>
                <form id="incomeForm">
                    <div class="form-group">
                        <label for="incomeAmount">Amount</label>
                        <input type="number" id="incomeAmount" placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="incomeCategory">Category</label>
                        <input type="text" id="incomeCategory" placeholder="Salary, Bonus, etc." required>
                    </div>
                    <div class="form-group">
                        <label for="incomeDate">Date</label>
                        <input type="date" id="incomeDate" required>
                    </div>
                    <div class="form-group">
                        <label for="incomeNote">Note</label>
                        <input type="text" id="incomeNote" placeholder="Optional note">
                    </div>
                    <button type="submit" class="submit-btn income-btn">Add Income</button>
                </form>
            </div>

            <div class="form-card">
                <h2>Add Expense</h2>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="expenseAmount">Amount</label>
                        <input type="number" id="expenseAmount" placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="expenseCategory">Category</label>
                        <input type="text" id="expenseCategory" placeholder="Entertainment, Food, etc." required>
                    </div>
                    <div class="form-group">
                        <label for="expenseDate">Date</label>
                        <input type="date" id="expenseDate" required>
                    </div>
                    <div class="form-group">
                        <label for="expenseNote">Note</label>
                        <input type="text" id="expenseNote" placeholder="Optional note">
                    </div>
                    <button type="submit" class="submit-btn expense-btn">Add Expense</button>
                </form>
            </div>
        </div>

        <div class="all-transactions">
            <h2>All Transactions</h2>
            <div class="transactions-list" id="allTransactionsList">
                <!-- All transactions will be populated here -->
            </div>
        </div>
    </main>

    <script type="module" src="scripts/transactions.js"></script>
</body>

</html>
