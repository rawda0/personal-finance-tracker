<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Personal Finance Tracker</title>
    <link rel="stylesheet" href="styles/register.css">
</head>

<body>
    <div class="container">
        <div class="left-section">
            <form class="register-form" id="registerForm">
                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password (min 6 chars)" required
                        minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required
                        minlength="6">
                </div>

                <div class="form-footer">
                    <button type="submit" class="register-button" id="registerButton">Register</button>
                </div>

                <div class="login">
                    <a href="#" id="loginLink">Already have an account? Login</a>
                </div>
            </form>
        </div>

        <div class="right-section">
            <div class="title">Personal<br>Finance Tracker</div>
        </div>
    </div>

    <script type="module" src="scripts/register.js"></script>
</body>

</html>
