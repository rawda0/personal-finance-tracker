<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Personal Finance Tracker</title>
    <link rel="stylesheet" href="styles/dashboard.css">
</head>

<body class="dashboard-page">
    <header class="navbar">
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="transactions.html" class="nav-link">Transactions</a>
            <a href="savings.html" class="nav-link">Savings</a>
        </nav>
        <div class="user-section">
            <span class="user-name" id="userName">Loading...</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <main class="dashboard-content">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Balance</h3>
                <p class="stat-value" id="totalBalance">$0.00</p>
            </div>
            <div class="stat-card">
                <h3>This Month's Income</h3>
                <p class="stat-value income" id="monthlyIncome">$0.00</p>
            </div>
            <div class="stat-card">
                <h3>This Month's Expenses</h3>
                <p class="stat-value expense" id="monthlyExpenses">$0.00</p>
            </div>
            <div class="stat-card">
                <h3>Savings</h3>
                <p class="stat-value savings" id="totalSavings">$0.00</p>
            </div>
        </div>

        <div class="chart-section">
            <h2>Spending by Category</h2>
            <div class="categories-grid" id="categoriesGrid">
                <!-- Categories will be populated here -->
            </div>
        </div>

        <div class="transactions-section">
            <h2>Recent Transactions</h2>
            <div class="transactions-list" id="transactionsList">
                <!-- Transactions will be populated here -->
            </div>
        </div>
    </main>

    <script type="module" src="scripts/dashboard.js"></script>
</body>

</html>
